<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VORTEX DIGITAL | الحلول الذكية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/dist/css/all.min.css">
    <style>
        :root {
            --primary: #00f5ff;
            --secondary: #ff00ff;
            --bg-dark: #0a0a0a;
            --card-bg: rgba(255, 255, 255, 0.07);
            --glass-border: rgba(0, 245, 255, 0.3);
            --text-light: #e0e0e0;
        }

        * { margin:0; padding:0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-family: 'Cairo', sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
        }

        #particles-js { position: fixed; top:0; left:0; width:100%; height:100%; z-index:-1; }

        header {
            height: 100vh; display:flex; flex-direction: column; justify-content:center;
            align-items:center; text-align:center; padding:20px; position:relative; overflow:hidden; background: #0a0a0a;
        }

        .header-video {
            position:absolute; top:50%; left:50%; min-width:100%; min-height:100%;
            width:auto; height:auto; transform:translate(-50%, -50%); z-index:0; opacity:0.4; object-fit: cover;
        }

        header::after {
            content:""; position:absolute; top:0; left:0; width:100%; height:100%;
            background: linear-gradient(to bottom, rgba(10,10,10,0.6), var(--bg-dark)); z-index:1;
        }

        .hero-content { position:relative; z-index:10; max-width:900px; }
        .hero-content h1 {
            font-family:'Orbitron', sans-serif; font-size:clamp(2.5rem, 8vw, 5rem);
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .hero-content p { color: var(--text-light); font-size:1.2rem; margin: 15px 0; }

        .btn-main {
            padding:15px 40px; border-radius:50px; border:none;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color:white; font-weight:bold; cursor:pointer; transition:0.4s;
            box-shadow: 0 10px 25px rgba(0, 245, 255, 0.3);
        }
        .btn-main:hover { transform: scale(1.05); }

        section { padding:80px 10%; position:relative; z-index:2; }

        .section-title { text-align:center; margin-bottom:50px; }
        .section-title h2 { font-size:2.5rem; color: var(--primary); }
        .section-title p { color: var(--text-light); font-size:1rem; }

        .grid-container { display:grid; grid-template-columns:repeat(auto-fit, minmax(280px, 1fr)); gap:25px; }

        .showcase-card, .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(18px);
            border: 1px solid var(--glass-border);
            border-radius:20px; padding:20px;
            transition:0.5s;
            color: var(--text-light);
        }

        .showcase-img { width:100%; height:200px; border-radius:15px; object-fit:cover; margin-bottom:15px; }

        .price-card { border:1px solid var(--glass-border); border-radius:30px; padding:40px; text-align:center; }
        .price-card.featured { transform: scale(1.05); }
        .price-tag { font-size:2.5rem; margin:20px 0; color: var(--primary); }

        .page { display:none; }
        .page.active { display:block; }

        footer { text-align:center; padding:40px; }

        /* ✅ التعديل الوحيد (الفورم) */
        .form-container {
            max-width:600px;
            margin:auto;
            padding:0 15px;
        }

        .form-container input, .form-container textarea {
            width:100%; padding:12px 15px; margin-bottom:15px;
            border-radius:10px; border:none;
            background: rgba(255,255,255,0.1);
            color: var(--text-light);
        }

        @media (max-width:768px){
            .form-container {
                padding:0 10px;
            }

            .form-container button {
                width:100%;
            }
        }
    </style>
</head>

<body>

<div id="particles-js"></div>

<div class="page active" id="home">
<header>
<video class="header-video" autoplay loop muted playsinline>
<source src="https://assets.mixkit.co/videos/preview/mixkit-digital-animation-of-blue-data-points-moving-944-large.mp4">
</video>

<div class="hero-content">
<h1>VORTEX DIGITAL</h1>
<p>نحن نبني المستقبل الرقمي</p>
<button class="btn-main" onclick="goTo('services')">خدماتنا</button>
</div>
</header>
</div>

<div class="page" id="services">
<section>
<h2>الخدمات</h2>
<button class="btn-main" onclick="goTo('home')">رجوع</button>
<div class="grid-container">
<div class="glass-card" onclick="goToForm('متجر')">متجر</div>
<div class="glass-card" onclick="goToForm('تصميم')">تصميم</div>
</div>
</section>
</div>

<div class="page" id="formPage">
<section>
<div class="form-container">
<h2>طلب</h2>
<form>
<input type="text" placeholder="اسمك">
<input type="text" id="projectType" readonly>
<input type="text" id="packagePrice" readonly>
<textarea placeholder="تفاصيل"></textarea>
<input type="tel" placeholder="رقمك">
<button class="btn-main">إرسال</button>
</form>
</div>
</section>
</div>

<footer>© 2026 VORTEX DIGITAL</footer>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

<script>
function goTo(id){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

function goToForm(service){
document.getElementById('projectType').value=service;
goTo('formPage');
}
</script>

</body>
</html>
