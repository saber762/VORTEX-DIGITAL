<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VORTEX DIGITAL</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
:root{
    --primary:#00f5ff;
    --secondary:#ff00ff;
    --bg:#0a0a0a;
    --glass:rgba(255,255,255,0.07);
    --border:rgba(0,245,255,0.3);
    --text:#e0e0e0;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
    background:var(--bg);
    color:var(--text);
    font-family:'Cairo',sans-serif;
    overflow-x:hidden;
}

/* الخلفية المتحركة */
#particles-js{
    position:fixed;
    width:100%;
    height:100%;
    z-index:-1;
}

header{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.hero h1{
    font-family:'Orbitron';
    font-size:3rem;
    background:linear-gradient(45deg,var(--primary),var(--secondary));
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.btn{
    padding:12px 30px;
    border-radius:50px;
    background:linear-gradient(45deg,var(--primary),var(--secondary));
    color:#fff;
    border:none;
    cursor:pointer;
    text-decoration:none;
    display:inline-block;
    margin-top:10px;
    transition:0.3s;
}

.btn:hover{transform:scale(1.05);}

section{padding:70px 10%;}

.title{text-align:center;margin-bottom:40px;}
.title h2{color:var(--primary);}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

/* Cards */
.card{
    background:var(--glass);
    border:1px solid var(--border);
    padding:20px;
    border-radius:15px;
    transition:0.3s;
}

.card:hover{transform:translateY(-5px);}

/* WhatsApp */
.whatsapp{
    position:fixed;
    bottom:20px;
    left:20px;
    background:#25D366;
    color:white;
    padding:15px;
    border-radius:50%;
    font-size:20px;
    z-index:999;
}
</style>
</head>

<body>

<!-- الخلفية المتحركة -->
<div id="particles-js"></div>

<!-- WhatsApp -->
<a class="whatsapp" href="https://wa.me/212XXXXXXXXX" target="_blank">
<i class="fab fa-whatsapp"></i>
</a>

<!-- HEADER -->
<header>
<div class="hero">
<h1>VORTEX DIGITAL</h1>
<p>نصمم مواقع احترافية تساعدك على النجاح 🚀</p>

<a href="#pricing" class="btn">الباقات</a>
<a href="#contact" class="btn">ابدأ مشروعك</a>
</div>
</header>

<!-- WHY -->
<section>
<div class="title"><h2>لماذا نحن؟</h2></div>

<div class="grid">
<div class="card"><h3>⚡ سرعة</h3><p>تنفيذ سريع</p></div>
<div class="card"><h3>📈 نتائج</h3><p>نحوّل الزوار لزبناء</p></div>
<div class="card"><h3>🎧 دعم</h3><p>مرافقة دائمة</p></div>
</div>
</section>

<!-- PRICING (الباقات رجعات) -->
<section id="pricing">
<div class="title"><h2>الباقات</h2></div>

<div class="grid">

<div class="card">
<h3>باقة الانطلاق</h3>
<p>300 درهم</p>
<button class="btn" onclick="selectPackage('باقة الانطلاق',300)">طلب الآن</button>
</div>

<div class="card">
<h3>باقة متوسطة</h3>
<p>150 درهم</p>
<button class="btn" onclick="selectPackage('باقة متوسطة',150)">طلب الآن</button>
</div>

<div class="card">
<h3>باقة الشركات</h3>
<p>حسب الطلب</p>
<button class="btn" onclick="selectPackage('باقة الشركات','حسب الطلب')">استشارة</button>
</div>

</div>
</section>

<!-- CONTACT -->
<section id="contact">
<div class="title"><h2>طلب مشروع</h2></div>

<div class="card">
<form onsubmit="sendWhatsApp(event)">

<input name="name" placeholder="الاسم" required><br><br>
<input name="service" id="service" readonly><br><br>
<input name="price" id="price" readonly><br><br>
<textarea name="details" placeholder="تفاصيل المشروع" required></textarea><br><br>
<input name="phone" placeholder="رقم الهاتف" required><br><br>

<button class="btn" style="width:100%;">إرسال</button>

</form>
</div>
</section>

<!-- SCRIPTS -->
<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

<script>
particlesJS("particles-js",{
    particles:{
        number:{value:80},
        color:{value:"#00f5ff"},
        line_linked:{enable:true,color:"#00f5ff"},
        move:{enable:true,speed:2},
        size:{value:3},
        opacity:{value:0.3}
    }
});

/* الباقات */
function selectPackage(name,price){
    document.getElementById('service').value=name;
    document.getElementById('price').value=price;
    document.getElementById('contact').scrollIntoView({behavior:'smooth'});
}

/* واتساب */
function sendWhatsApp(e){
e.preventDefault();

let name=document.querySelector('[name="name"]').value;
let service=document.querySelector('[name="service"]').value;
let price=document.querySelector('[name="price"]').value;
let details=document.querySelector('[name="details"]').value;
let phone=document.querySelector('[name="phone"]').value;

let msg=طلب جديد 🚀%0Aالاسم: ${name}%0Aالخدمة: ${service}%0Aالسعر: ${price}%0Aالتفاصيل: ${details}%0Aالهاتف: ${phone};

window.open(https://wa.me/212XXXXXXXXX?text=${msg},'_blank');
}
</script>

</body>
</html>
