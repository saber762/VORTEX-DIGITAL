<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VORTEX DIGITAL | الحلول الذكية</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
:root {
    --primary: #00f5ff;
    --secondary: #ff00ff;
    --bg-dark: #0a0a0a;
    --card-bg: rgba(255,255,255,0.07);
    --glass-border: rgba(0,245,255,0.3);
    --text-light: #e0e0e0;
}

* {margin:0;padding:0;box-sizing:border-box;}

body {
    background: var(--bg-dark);
    color: var(--text-light);
    font-family: 'Cairo', sans-serif;
    overflow-x:hidden;
}

/* الخلفية */
#particles-js {
    position:fixed;
    width:100%;
    height:100%;
    z-index:-1;
}

/* HEADER */
header {
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
    position:relative;
}

.header-video {
    position:absolute;
    top:50%;
    left:50%;
    min-width:100%;
    min-height:100%;
    transform:translate(-50%,-50%);
    opacity:0.4;
    object-fit:cover;
}

header::after {
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:linear-gradient(to bottom, rgba(10,10,10,0.6), var(--bg-dark));
}

.hero-content {position:relative;z-index:2;}

.hero-content h1 {
    font-family:'Orbitron';
    font-size:clamp(2.5rem, 8vw, 5rem);
    background:linear-gradient(to right, var(--primary), var(--secondary));
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.hero-content p {margin:15px 0;}

.btn-main {
    padding:15px 40px;
    border:none;
    border-radius:50px;
    background:linear-gradient(45deg, var(--primary), var(--secondary));
    color:white;
    cursor:pointer;
}

/* SECTIONS */
section {padding:80px 10%;}

.section-title {
    text-align:center;
    margin-bottom:40px;
}

.grid-container {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:20px;
}

/* CARDS */
.glass-card, .showcase-card {
    background:var(--card-bg);
    backdrop-filter:blur(15px);
    border:1px solid var(--glass-border);
    border-radius:20px;
    padding:20px;
}

.showcase-img {
    width:100%;
    height:200px;
    object-fit:cover;
    border-radius:15px;
}

/* PRICE */
.price-card {
    padding:40px;
    text-align:center;
    border:1px solid var(--glass-border);
    border-radius:20px;
}

.price-card.featured {
    transform:scale(1.05);
}

.price-tag {
    font-size:2.5rem;
    color:var(--primary);
}

/* FORM */
.form-container {
    max-width:600px;
    margin:auto;
}

.form-container input,
.form-container textarea {
    width:100%;
    padding:12px;
    margin-bottom:10px;
    border-radius:10px;
    border:none;
    background:rgba(255,255,255,0.1);
    color:white;
}

/* PAGES */
.page {display:none;}
.page.active {display:block;}

footer {
    text-align:center;
    padding:30px;
}

/* ========================= */
/* 📱 RESPONSIVE */
/* ========================= */

@media (max-width:768px){

    header {
        height:auto;
        padding:100px 20px;
    }

    .hero-content h1 {
        font-size:2rem;
    }

    .btn-main {
        width:100%;
    }

    section {
        padding:50px 20px;
    }

    .price-card {
        padding:25px;
    }

    .price-card.featured {
        transform:scale(1);
    }

    .showcase-img {
        height:150px;
    }
}
</style>
</head>

<body>

<div id="particles-js"></div>

<!-- HOME -->
<div class="page active" id="home">

<header>
<video class="header-video" autoplay loop muted>
<source src="https://assets.mixkit.co/videos/preview/mixkit-digital-animation-of-blue-data-points-moving-944-large.mp4">
</video>

<div class="hero-content">
<h1>VORTEX DIGITAL</h1>
<p>نحن نبني المستقبل الرقمي</p>
<button class="btn-main" onclick="goTo('services')">خدماتنا</button>
</div>
</header>

<section>
<div class="section-title"><h2>باقاتنا</h2></div>

<div class="grid-container">
<div class="price-card">
<h3>باقة 1</h3>
<span class="price-tag">300dh</span>
<button class="btn-main" onclick="choosePackage('موقع',300)">اطلب</button>
</div>

<div class="price-card featured">
<h3>باقة 2</h3>
<span class="price-tag">150dh</span>
<button class="btn-main" onclick="choosePackage('تصميم',150)">اطلب</button>
</div>
</div>
</section>

</div>

<!-- SERVICES -->
<div class="page" id="services">
<section>
<div class="section-title">
<h2>الخدمات</h2>
<button class="btn-main" onclick="goTo('home')">رجوع</button>
</div>

<div class="grid-container">
<div class="glass-card" onclick="goToForm('متجر')">متجر</div>
<div class="glass-card" onclick="goToForm('تصميم')">تصميم</div>
</div>
</section>
</div>

<!-- FORM -->
<div class="page" id="formPage">
<section>
<div class="form-container">
<h2>طلب</h2>
<form>
<input type="text" placeholder="اسمك">
<input type="text" id="projectType" readonly>
<input type="text" id="packagePrice" readonly>
<textarea placeholder="تفاصيل"></textarea>
<input type="tel" placeholder="رقمك">
<button class="btn-main">إرسال</button>
</form>
</div>
</section>
</div>

<footer>© 2026 VORTEX DIGITAL</footer>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

<script>
particlesJS("particles-js",{
particles:{number:{value:50},color:{value:"#00f5ff"}}
});

/* تحسين الأداء في الهاتف */
if(window.innerWidth < 768){
    document.querySelector('.header-video').style.display = "none";
}

/* التنقل */
function goTo(id){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById(id).classList.add('active');
window.scrollTo({top:0});
}

function choosePackage(name,price){
document.getElementById('projectType').value=name;
document.getElementById('packagePrice').value=price;
goTo('formPage');
}

function goToForm(service){
document.getElementById('projectType').value=service;
goTo('formPage');
}
</script>

</body>
</html>
