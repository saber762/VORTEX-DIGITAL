<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VORTEX DIGITAL | حسابي</title>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --primary: #00f5ff;
            --secondary: #ff00ff;
            --bg-dark: #0a0a0a;
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(0, 245, 255, 0.28);
            --text: #e6edf6;
            --muted: #9fb0c8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            font-family: "Cairo", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at 15% 20%, rgba(0, 245, 255, 0.22), transparent 38%),
                radial-gradient(circle at 85% 80%, rgba(255, 0, 255, 0.18), transparent 35%),
                linear-gradient(140deg, #05070b 0%, #0a1220 50%, #07090f 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .container {
            width: 100%;
            max-width: 900px;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 18px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand .logo {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 900;
            letter-spacing: 0.5px;
            box-shadow: 0 12px 30px rgba(0,245,255,0.16);
        }

        .brand h1 {
            font-size: 1.25rem;
            line-height: 1.2;
        }

        .glass {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 20px;
            box-shadow: 0 16px 45px rgba(0, 0, 0, 0.35);
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        @media (max-width: 820px) {
            .grid { grid-template-columns: 1fr; }
            body { padding: 16px; }
        }

        .card {
            padding: 18px 16px;
        }

        .card-title {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
            color: #ffffff;
            font-weight: 900;
        }

        .card-title i {
            color: var(--primary);
        }

        .field {
            margin-bottom: 12px;
        }

        .field label {
            display: block;
            color: var(--muted);
            font-weight: 700;
            font-size: 0.92rem;
            margin-bottom: 7px;
        }

        .input-wrap {
            position: relative;
        }

        input {
            width: 100%;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.14);
            background: rgba(255, 255, 255, 0.07);
            color: var(--text);
            padding: 12px 14px;
            outline: none;
            font-size: 0.95rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 245, 255, 0.16);
        }

        input[readonly] {
            background: rgba(0, 0, 0, 0.18);
            color: var(--primary);
            font-weight: 700;
        }

        .eye-btn {
            position: absolute;
            left: 8px;
            top: 50%;
            transform: translateY(-50%);
            border: none;
            background: transparent;
            color: #cfe9ff;
            cursor: pointer;
            padding: 8px;
            border-radius: 10px;
        }

        .eye-btn:hover {
            color: var(--primary);
        }

        .password-row input {
            padding-left: 46px;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 16px;
        }

        .btn {
            border: none;
            cursor: pointer;
            padding: 12px 16px;
            border-radius: 14px;
            font-weight: 900;
            color: #fff;
            transition: transform 0.2s ease, opacity 0.2s ease;
        }

        .btn:hover {
            transform: translateY(-1px);
        }

        .btn-primary {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            flex: 1;
            min-width: 220px;
        }

        .btn-danger {
            background: linear-gradient(45deg, #ff3b3b, #ff006a);
            flex: 0 0 auto;
            min-width: 160px;
        }

        .note {
            margin-top: 10px;
            color: var(--muted);
            font-size: 0.85rem;
            line-height: 1.8;
        }

        .subtle {
            margin-top: 10px;
            color: var(--muted);
            font-size: 0.85rem;
        }

        .input-wrap {
            position: relative;
        }

        .eye-btn {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            border: none;
            background: transparent;
            color: #cfe9ff;
            cursor: pointer;
            padding: 8px;
            border-radius: 10px;
        }

        .eye-btn:hover {
            color: var(--primary);
        }

        .password-row input {
            padding-left: 46px;
        }

        .reset-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: none;
            background: transparent;
            color: var(--primary);
            cursor: pointer;
            padding: 8px 0;
            font-weight: 900;
        }

        .reset-link:hover {
            text-decoration: underline;
        }

        .new-password-section {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transform: translateY(-10px);
            transition: max-height 0.35s ease, opacity 0.25s ease, transform 0.35s ease;
        }

        .new-password-section.open {
            max-height: 360px;
            opacity: 1;
            transform: translateY(0);
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="topbar">
            <div class="brand">
                <div class="logo"><i class="fas fa-vortex"></i></div>
                <h1>حسابي</h1>
            </div>
            <button id="logoutBtn" class="btn btn-danger" type="button">
                <i class="fas fa-right-from-bracket" style="margin-left:8px;"></i>تسجيل الخروج
            </button>
        </div>

        <div class="grid">
            <div class="card glass">
                <div class="card-title">
                    <i class="fas fa-user-gear"></i>
                    لوحة تحكم الزبون
                </div>

                <div class="field">
                    <label for="firstName">الاسم الأول</label>
                    <input id="firstName" type="text" placeholder="اكتب اسمك" autocomplete="given-name">
                </div>

                <div class="field">
                    <label for="lastName">الاسم العائلي</label>
                    <input id="lastName" type="text" placeholder="—" autocomplete="family-name" readonly>
                </div>

                <div class="field">
                    <label for="email">البريد الإلكتروني</label>
                    <input id="email" type="email" readonly>
                </div>

                <div class="actions">
                    <button id="saveBtn" class="btn btn-primary" type="button">
                        <i class="fas fa-save" style="margin-left:8px;"></i>حفظ التغييرات
                    </button>
                </div>

                <div class="subtle">
                    يمكنك تعديل الاسم الأول فقط. يتم حفظ التغييرات مباشرة في قاعدة البيانات.
                </div>
            </div>

            <div class="card glass">
                <div class="card-title">
                    <i class="fas fa-lock"></i>
                    تغيير كلمة المرور
                </div>

                <div class="field">
                    <label for="currentPassword">كلمة المرور الحالية</label>
                    <div class="input-wrap password-row">
                        <button id="toggleCurrentPasswordBtn" type="button" class="eye-btn" aria-label="إظهار/إخفاء كلمة المرور الحالية">
                            <i id="currentEyeIcon" class="fas fa-eye"></i>
                        </button>
                        <input id="currentPassword" type="password" placeholder="••••••••" autocomplete="current-password">
                    </div>
                </div>

                <div class="note">
                    <button id="resetPasswordLink" type="button" class="reset-link">
                        <i class="fas fa-key" style="font-size:0.9rem;"></i> إعادة تعيين كلمة المرور
                    </button>
                </div>

                <div id="newPasswordSection" class="new-password-section">
                    <div class="field">
                        <label for="newPassword">كلمة المرور الجديدة</label>
                        <input id="newPassword" type="password" placeholder="••••••••" autocomplete="new-password">
                    </div>

                    <div class="field">
                        <label for="confirmPassword">تأكيد كلمة المرور</label>
                        <input id="confirmPassword" type="password" placeholder="••••••••" autocomplete="new-password">
                    </div>

                    <div class="actions">
                        <button id="changePasswordBtn" class="btn btn-primary" type="button">
                            <i class="fas fa-save" style="margin-left:8px;"></i> حفظ التغييرات
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
        import {
            getAuth,
            onAuthStateChanged,
            signOut,
            updatePassword,
            EmailAuthProvider,
            reauthenticateWithCredential
        } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-auth.js";
        import {
            getDatabase,
            ref,
            get,
            update,
            serverTimestamp
        } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDcjbHnDcYbM8CN5i2TqFSVFC2JMacCP2I",
            authDomain: "vortex-digital-246c7.firebaseapp.com",
            projectId: "vortex-digital-246c7",
            storageBucket: "vortex-digital-246c7.firebasestorage.app",
            messagingSenderId: "91276574885",
            appId: "1:91276574885:web:46a4042ac788bc71910d4c",
            measurementId: "G-N0LBGXSX0T"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const database = getDatabase(app);

        const firstNameInput = document.getElementById("firstName");
        const lastNameInput = document.getElementById("lastName");
        const emailInput = document.getElementById("email");
        const saveBtn = document.getElementById("saveBtn");
        const logoutBtn = document.getElementById("logoutBtn");

        const currentPasswordInput = document.getElementById("currentPassword");
        const toggleCurrentPasswordBtn = document.getElementById("toggleCurrentPasswordBtn");
        const currentEyeIcon = document.getElementById("currentEyeIcon");
        const resetPasswordLink = document.getElementById("resetPasswordLink");
        const newPasswordSection = document.getElementById("newPasswordSection");
        const newPasswordInput = document.getElementById("newPassword");
        const confirmPasswordInput = document.getElementById("confirmPassword");
        const changePasswordBtn = document.getElementById("changePasswordBtn");

        let currentUser = null;

        function setInputsEnabled(enabled) {
            // الاسم الأول فقط هو القابل للتعديل
            firstNameInput.disabled = !enabled;
            lastNameInput.disabled = true;
            saveBtn.disabled = !enabled;
        }

        setInputsEnabled(false);

        function setPasswordInputsEnabled(enabled) {
            currentPasswordInput.disabled = !enabled;
            resetPasswordLink.disabled = !enabled;
            newPasswordInput.disabled = true;
            confirmPasswordInput.disabled = true;
            changePasswordBtn.disabled = true;
        }

        setPasswordInputsEnabled(false);

        function swalError(title, text) {
            Swal.fire({
                icon: "error",
                title,
                text
            });
        }

        function setNewPasswordSectionOpen(open) {
            if (!open) {
                newPasswordSection.classList.remove("open");
                newPasswordInput.value = "";
                confirmPasswordInput.value = "";
                newPasswordInput.disabled = true;
                confirmPasswordInput.disabled = true;
                changePasswordBtn.disabled = true;
                return;
            }

            newPasswordSection.classList.add("open");
            newPasswordInput.disabled = false;
            confirmPasswordInput.disabled = false;
            changePasswordBtn.disabled = false;
        }

        toggleCurrentPasswordBtn.addEventListener("click", () => {
            const isPasswordHidden = currentPasswordInput.type === "password";
            currentPasswordInput.type = isPasswordHidden ? "text" : "password";
            currentEyeIcon.className = isPasswordHidden ? "fas fa-eye-slash" : "fas fa-eye";
        });

        resetPasswordLink.addEventListener("click", () => {
            const shouldOpen = !newPasswordSection.classList.contains("open");
            setNewPasswordSectionOpen(shouldOpen);
        });

        async function loadProfile() {
            if (!currentUser) return;

            try {
                // جلب بيانات الزبون من users/${user.uid}
                const userSnap = await get(ref(database, `users/${currentUser.uid}`));
                const data = userSnap.exists() ? userSnap.val() : {};

                firstNameInput.value = data.firstName || "";
                lastNameInput.value = data.lastName || "";
                emailInput.value = data.email || currentUser.email || "";
            } catch (err) {
                console.error("Load profile error:", err);
                swalError("تعذر تحميل البيانات", "حدث خطأ أثناء جلب بيانات الحساب.");
            } finally {
                setInputsEnabled(true);
            }
        }

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = "auth.html";
                return;
            }

            currentUser = user;
            await loadProfile();
            setPasswordInputsEnabled(true);
        });

        logoutBtn.addEventListener("click", async () => {
            try {
                await signOut(auth);
                window.location.href = "index.html";
            } catch (err) {
                console.error("Logout error:", err);
                swalError("تعذر تسجيل الخروج", "حاول مرة أخرى.");
            }
        });

        saveBtn.addEventListener("click", async () => {
            if (!currentUser) return;

            const firstName = firstNameInput.value.trim();

            if (!firstName) {
                Swal.fire({
                    icon: "warning",
                    title: "حقول ناقصة",
                    text: "الرجاء إدخال الاسم الأول."
                });
                return;
            }

            const originalText = saveBtn.innerHTML;
            saveBtn.disabled = true;
            saveBtn.innerHTML = '<i class="fas fa-spinner fa-spin" style="margin-left:8px;"></i>جارٍ الحفظ...';

            try {
                await update(ref(database, `users/${currentUser.uid}`), {
                    firstName,
                    updatedAt: serverTimestamp()
                });

                await Swal.fire({
                    icon: "success",
                    title: "تم حفظ التغييرات بنجاح",
                    timer: 1500,
                    showConfirmButton: false
                });
            } catch (err) {
                console.error("Save error:", err);
                const code = err?.code || "";

                let message = "تعذر حفظ التعديلات، حاول مرة أخرى.";
                // لا يوجد تغيير كلمة مرور في لوحة تحكم الزبون

                await Swal.fire({
                    icon: "error",
                    title: "خطأ أثناء الحفظ",
                    text: message
                });
            } finally {
                saveBtn.disabled = false;
                saveBtn.innerHTML = originalText;
            }
        });

        changePasswordBtn.addEventListener("click", async () => {
            if (!currentUser) return;

            const currentPassword = currentPasswordInput.value;
            const newPassword = newPasswordInput.value;
            const confirmPassword = confirmPasswordInput.value;

            if (!currentPassword) {
                Swal.fire({ icon: "warning", title: "كلمة المرور الحالية مطلوبة", text: "يرجى إدخال كلمة المرور الحالية." });
                return;
            }

            if (!newPassword || newPassword.length < 6) {
                Swal.fire({ icon: "warning", title: "كلمة المرور الجديدة ضعيفة", text: "كلمة المرور الجديدة يجب أن تكون 6 أحرف أو أكثر على الأقل." });
                return;
            }

            if (newPassword !== confirmPassword) {
                Swal.fire({ icon: "warning", title: "عدم تطابق كلمة المرور", text: "تأكيد كلمة المرور غير مطابق." });
                return;
            }

            const originalText = changePasswordBtn.innerHTML;
            changePasswordBtn.disabled = true;
            changePasswordBtn.innerHTML = '<i class="fas fa-spinner fa-spin" style="margin-left:8px;"></i>جاري التحديث...';

            try {
                // Firebase يتطلب إعادة تسجيل الدخول عند بعض الحالات الأمنية.
                const credential = EmailAuthProvider.credential(currentUser.email, currentPassword);
                await reauthenticateWithCredential(currentUser, credential);
                await updatePassword(currentUser, newPassword);

                await Swal.fire({
                    icon: "success",
                    title: "تم تحديث كلمة المرور بنجاح",
                    timer: 1500,
                    showConfirmButton: false
                });

                // Hide fields again (after success)
                currentPasswordInput.value = "";
                setNewPasswordSectionOpen(false);
                resetPasswordLink.classList.remove("open");
            } catch (err) {
                console.error("Password update error:", err);
                const code = err?.code || "";
                let message = "تعذر تحديث كلمة المرور، حاول مرة أخرى.";

                if (code.includes("wrong-password")) {
                    message = "كلمة المرور الحالية غير صحيحة.";
                } else if (code.includes("weak-password")) {
                    message = "كلمة المرور الجديدة ضعيفة جداً. استخدم كلمة أقوى (6 أحرف أو أرقام على الأقل).";
                } else if (code.includes("requires-recent-login")) {
                    message = "لأسباب أمنية، يرجى إعادة تسجيل الدخول ثم حاول مرة أخرى.";
                }

                await Swal.fire({
                    icon: "error",
                    title: "خطأ في تحديث كلمة المرور",
                    text: message
                });
            } finally {
                changePasswordBtn.disabled = false;
                changePasswordBtn.innerHTML = originalText;
            }
        });
    </script>
</body>
</html>
